<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>  ✶✧✦✶</title>
<style>
html,body{
  margin:0;
  overflow:hidden;
}
#bg{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:white;
  z-index:0;
}
canvas{
  display:block;
  position:fixed;
  top:0; left:0;
  z-index:1;
  filter: invert(0);
  transition: filter 0.8s linear;
}
canvas.inverted{
  filter: invert(1);
}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="c"></canvas>
<script>
<script>
// ---------------- CONFIG ----------------
const FRAME_COUNT = 12;
const FRAME_DURATION = 60;
const STAR_MIN_SIZE = 140;
const STAR_MAX_SIZE = 320;

// ---------------- CANVAS ----------------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const bgDiv = document.getElementById('bg');

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// ---------------- SAFE ASSET LOADER ----------------
function pad(n){ return String(n).padStart(2,'0'); }

function loadGroup(name){
  return new Promise((resolve) => {
    const arr = [];
    let loaded = 0;

    for(let i=1;i<=FRAME_COUNT;i++){
      const img = new Image();

      const src = `./assets/${name}/${name}_${pad(i)}.png`;
      img.src = src;

      img.onload = () => {
        loaded++;
        if(loaded === FRAME_COUNT){
          console.log(`✔ Loaded group: ${name}`);
          resolve(arr);
        }
      };

      img.onerror = () => {
        console.error(`❌ Failed to load: ${src}`);
      };

      arr.push(img);
    }
  });
}

// ---------------- STAR ----------------
class Star{
  constructor(x,y,frames){
    this.x = x;
    this.y = y;
    this.size = STAR_MIN_SIZE + Math.random()*(STAR_MAX_SIZE-STAR_MIN_SIZE);
    this.frames = frames;
    this.start = performance.now();
    this.dead = false;
  }

  update(){
    const t = performance.now() - this.start;
    const idx = Math.floor(t / FRAME_DURATION);

    if(idx >= this.frames.length){
      this.dead = true;
      return;
    }

    this.frame = idx;
  }

  draw(){
    const img = this.frames[this.frame];
    if(!img || !img.complete) return;

    ctx.drawImage(
      img,
      this.x - this.size/2,
      this.y - this.size/2,
      this.size,
      this.size
    );
  }
}

// ---------------- STATE ----------------
let stars = [];
let pointerDown = false;
let spaceHeld = false;
let invert = 0;

let groupA = null;
let groupB = null;

// ---------------- INPUT ----------------
window.addEventListener("pointerdown",(e)=>{
  if(!groupA || !groupB) return; // block until ready

  const frames = Math.random() > 0.5 ? groupA : groupB;

  stars.push(
    new Star(e.clientX, e.clientY, frames)
  );
});

window.addEventListener("keydown",(e)=>{
  if(e.code === "Space") spaceHeld = true;
});

window.addEventListener("keyup",(e)=>{
  if(e.code === "Space") spaceHeld = false;
});

// ---------------- RENDER LOOP ----------------
function loop(){
  requestAnimationFrame(loop);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const target = spaceHeld ? 1 : 0;
  invert += (target - invert) * 0.08;

  canvas.classList.toggle('inverted', invert > 0.5);

  const bg = 255 - invert * 255;
  bgDiv.style.background = `rgb(${bg},${bg},${bg})`;

  // spawn ambient stars
  if(groupA && invert > 0.5 && Math.random() < 0.06){
    const frames = Math.random() > 0.5 ? groupA : groupB;

    stars.push(
      new Star(
        Math.random()*canvas.width,
        Math.random()*canvas.height,
        frames
      )
    );
  }

  // update/draw
  for(let i=stars.length-1;i>=0;i--){
    stars[i].update();
    stars[i].draw();

    if(stars[i].dead){
      stars.splice(i,1);
    }
  }
}

// ---------------- BOOT SYSTEM (IMPORTANT) ----------------
async function init(){
  console.log("⏳ Loading assets...");

  [groupA, groupB] = await Promise.all([
    loadGroup('a'),
    loadGroup('b')
  ]);

  console.log("🚀 All assets loaded. Starting loop.");

  loop();
}

init();
</script>
</script>
</body>
</html>

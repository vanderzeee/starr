<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>  ✶✧✦✶</title>
<style>
html,body{
  margin:0;
  overflow:hidden;
}
#bg{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:white;
  z-index:0;
}
canvas{
  display:block;
  position:fixed;
  top:0; left:0;
  z-index:1;
  filter: invert(0);
  transition: filter 0.8s linear;
}
canvas.inverted{
  filter: invert(1);
}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="c"></canvas>
<script>
// ---------------- CONFIG ----------------
const FRAME_COUNT = 12;
const FRAME_DURATION = 60;
const STAR_MIN_SIZE = 140;
const STAR_MAX_SIZE = 320;

// ---------------- CANVAS ----------------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const bgDiv = document.getElementById('bg');

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// ---------------- IMGS ----------------
function pad(n){ return String(n).padStart(2,'0'); }

function loadGroup(name){
  let arr = [];
  for(let i=1;i<=FRAME_COUNT;i++){
    let img = new Image();
    img.src = `./starr/assets/${name}/${name}_${pad(i)}.png`;
    arr.push(img);
  }
  return arr;
}

const groupA = loadGroup('a');
const groupB = loadGroup('b');
const groups = [groupA, groupB];

// ---------------- STAR ----------------
class Star{
  constructor(x,y){
    this.x = x;
    this.y = y;
    this.size = STAR_MIN_SIZE + Math.random()*(STAR_MAX_SIZE-STAR_MIN_SIZE);
    this.frames = groups[Math.floor(Math.random()*groups.length)];
    this.start = performance.now();
    this.dead = false;
  }
  update(){
    let t = performance.now() - this.start;
    let idx = Math.floor(t / FRAME_DURATION);
    if(idx >= this.frames.length){
      this.dead = true;
    }
    this.frame = idx;
  }
  draw(){
    let img = this.frames[Math.min(this.frame, this.frames.length-1)];
    if(!img) return;
    ctx.drawImage(
      img,
      this.x - this.size/2,
      this.y - this.size/2,
      this.size,
      this.size
    );
  }
}

let stars = [];

// ---------------- STATES ----------------
let pointerDown = false;
let spaceHeld = false;
let invert = 0;

// ---------------- INPUT ----------------
canvas.addEventListener("pointerdown",(e)=>{
  pointerDown = true;
  const rect = canvas.getBoundingClientRect();
  stars.push(
    new Star(
      e.clientX - rect.left,
      e.clientY - rect.top
    )
  );
});

window.addEventListener("pointerup",()=>{
  pointerDown = false;
});

window.addEventListener("keydown",(e)=>{
  if(e.code === "Space"){
    spaceHeld = true;
  }
});

window.addEventListener("keyup",(e)=>{
  if(e.code === "Space"){
    spaceHeld = false;
  }
});

// ---------------- LOOP ----------------
function loop(){
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // smooth fade
  let target = spaceHeld ? 1 : 0;
  invert += (target - invert) * 0.08; // slower = longer fade
  if(Math.abs(target - invert) < 0.002) invert = target; // snap to fully resolve

  // stars invert
  canvas.classList.toggle('inverted', invert > 0.5);

  // background fade
  let bg = 255 - invert * 255;
  bgDiv.style.background = `rgb(${bg},${bg},${bg})`;

  if(invert > 0.5 && Math.random() < 0.06){
    stars.push(
      new Star(
        Math.random()*canvas.width,
        Math.random()*canvas.height
      )
    );
  }

  // update + draw
  for(let i=stars.length-1;i>=0;i--){
    stars[i].update();
    stars[i].draw();
    if(stars[i].dead){
      stars.splice(i,1);
    }
  }
}
loop();
</script>
</body>
</html>
